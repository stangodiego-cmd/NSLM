<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSLM Banda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:Arial, Helvetica, sans-serif;
}

.portada{
width:100%;
}

.portada img{
width:100%;
display:block;
}

.botonera{
background:#000;
padding:40px 20px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.boton{
display:inline-block;
padding:18px 40px;
border:1px solid #7a5a2d;
color:#d8c5a0;
text-decoration:none;
font-size:24px;
font-weight:bold;
letter-spacing:2px;
transition:.3s;
}

.boton:hover{
background:#7a5a2d;
color:#fff;
}

@media(max-width:768px){

.botonera{
flex-direction:column;
align-items:center;
}

.boton{
width:90%;
text-align:center;
font-size:20px;
}

}

</style>
</head>

<body>

<div class="portada">
<img src="texto portada la banda.png" alt="NSLM Banda">
</div>

<div class="botonera">

<a class="boton"
href="https://youtu.be/I8mYQusnFyc?si=G-m8LPp403rvlFF6"
target="_blank">
▶ VER VIDEO
</a>

<a class="boton"
href="integrantes.html">
🎵 MÚSICOS
</a>

</div>

</body>
</html>
