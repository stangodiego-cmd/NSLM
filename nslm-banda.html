<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSLM Banda</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

.portada{
    width:100%;
    height:76vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
}

.portada img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
}

.botonera{
    width:100%;
    min-height:24vh;
    background:#000;
    border-top:1px solid #3a2a1c;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    padding:20px;
    flex-wrap:wrap;
}

.boton{
    color:#d8c5a0;
    text-decoration:none;
    font-size:28px;
    font-weight:bold;
    letter-spacing:4px;
    padding:18px 55px;
    border:1px solid #6f5430;
}

.boton:hover{
    background:#6f5430;
    color:#fff;
}

@media(max-width:768px){
    .portada{
        height:68vh;
    }

    .botonera{
        min-height:32vh;
        flex-direction:column;
        gap:14px;
    }

    .boton{
        width:90%;
        text-align:center;
        font-size:20px;
        padding:16px;
    }
}
</style>
</head>

<body>

<section class="portada">
    <img src="texto portada la banda.png" alt="NSLM Banda">
</section>

<nav class="botonera">
    <a class="boton" href="https://youtu.be/I8mYQusnFyc?si=G-m8LPp403rvlFF6" target="_blank">▶ VER VIDEO</a>
    <a class="boton" href="musicos.html">🎵 MÚSICOS</a>
</nav>

</body>
</html>
