<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSLM - Nos Sobran Los Motivos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

.portada{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.portada img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.botonera{
    width:100%;
    background:#000;
    border-top:1px solid #3a2a1c;
    border-bottom:1px solid #3a2a1c;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    padding:28px 20px;
}

.botonera a{
    color:#d8c5a0;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    letter-spacing:3px;
    padding:14px 28px;
    border:1px solid #6f5430;
}

.botonera a:hover{
    background:#6f5430;
    color:#fff;
}

@media(max-width:768px){
    .botonera{
        flex-direction:column;
        gap:14px;
    }

    .botonera a{
        width:90%;
        text-align:center;
        font-size:16px;
    }
}
</style>
</head>

<body>

<section class="portada">
    <img src="portada web.png" alt="Nos Sobran Los Motivos">
</section>

<nav class="botonera">
    <a href="#banda">NSLM BANDA</a>
    <a href="#cartelera">CARTELERA</a>
    <a href="#contrataciones">CONTRATACIONES</a>
    <a href="#contacto">CONTACTO</a>
</nav>

</body>
</html>
